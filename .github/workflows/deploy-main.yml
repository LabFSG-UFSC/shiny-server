name: Deploy Shiny Apps (main only)

on:
  push:
    branches:
      - main

concurrency:
  group: shiny-main-deploy
  cancel-in-progress: false

jobs:
  deploy:
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' && github.repository == 'LabFSG-UFSC/shiny-server' }}
    runs-on: [self-hosted, Linux, x64, shiny-labfsg]
    permissions:
      contents: read
    env:
      SHINY_OPERATOR: ${{ secrets.SHINY_OPERATOR }}
      SHINY_MAINTAINER: ${{ secrets.SHINY_MAINTAINER }}
      SHINY_JUMP_HOST: ${{ secrets.SHINY_JUMP_HOST }}
      SHINY_VM_HOST: ${{ secrets.SHINY_VM_HOST }}
      SHINY_BASE_DIR: /srv/shiny-server
      SHINY_PUBLIC_BASE_URL: http://shiny.labfsg.intra
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate required secrets
        shell: bash
        run: |
          set -euo pipefail
          : "${SHINY_OPERATOR:?Missing secret SHINY_OPERATOR}"
          : "${SHINY_MAINTAINER:?Missing secret SHINY_MAINTAINER}"
          : "${SHINY_JUMP_HOST:?Missing secret SHINY_JUMP_HOST}"
          : "${SHINY_VM_HOST:?Missing secret SHINY_VM_HOST}"

      - name: Detect changed app directories
        id: changed
        shell: bash
        run: |
          set -euo pipefail
          BEFORE="${{ github.event.before }}"
          AFTER="${{ github.sha }}"

          if [[ -z "$BEFORE" || "$BEFORE" == "0000000000000000000000000000000000000000" ]]; then
            BEFORE="$(git rev-list --max-parents=0 HEAD | tail -n1)"
          fi

          mapfile -t apps < <(
            git diff --name-only "$BEFORE" "$AFTER" \
              | awk -F/ '/^apps\/[^\/]+\// {print $1"/"$2}' \
              | sort -u
          )

          if [[ ${#apps[@]} -eq 0 ]]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          {
            echo "changed=true"
            echo "apps<<EOF"
            printf '%s\n' "${apps[@]}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Validate app structure
        if: steps.changed.outputs.changed == 'true'
        shell: bash
        run: |
          set -euo pipefail
          while IFS= read -r app_dir; do
            [[ -z "$app_dir" ]] && continue
            if [[ -f "$app_dir/app.R" ]] || ([[ -f "$app_dir/ui.R" ]] && [[ -f "$app_dir/server.R" ]]); then
              echo "OK: $app_dir"
            else
              echo "ERROR: $app_dir sem app.R ou ui.R+server.R" >&2
              exit 1
            fi
          done <<< "${{ steps.changed.outputs.apps }}"

      - name: Deploy changed apps
        if: steps.changed.outputs.changed == 'true'
        shell: bash
        run: |
          set -euo pipefail
          while IFS= read -r app_dir; do
            [[ -z "$app_dir" ]] && continue
            app_name="$(basename "$app_dir")"
            echo "Deploying $app_name from $app_dir"
            bash scripts/shiny_app_deploy.sh "$app_dir" "$app_name"
          done <<< "${{ steps.changed.outputs.apps }}"
